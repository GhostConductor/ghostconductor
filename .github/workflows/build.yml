name: Build

on:
  push:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get latest web-ui dev artifact
        run: |
          echo "Getting latest run ID..."
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/GhostConductor/web-ui/actions/workflows/build.yml/runs?branch=dev&status=success&per_page=1")
          echo "$RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].id')
          echo "Run ID: $RUN_ID"

          ARTIFACT_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/GhostConductor/web-ui/actions/runs/${RUN_ID}/artifacts")
          echo "$ARTIFACT_RESPONSE"
          ARTIFACT_ID=$(echo "$ARTIFACT_RESPONSE" | jq -r '.artifacts[0].id')
          echo "Artifact ID: $ARTIFACT_ID"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/GhostConductor/web-ui/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o web-ui.zip

          mkdir -p ui/dist
          unzip -o web-ui.zip -d ui/dist

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.defaultImage=ghcr.io/ghostconductor/ghost:dev" -o ghostconductor .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostconductor-darwin-arm64
          path: ghostconductor
