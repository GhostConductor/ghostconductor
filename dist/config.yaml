version: 2
project_name: ghostconductor
release:
  github:
    owner: GhostConductor
    name: ghostconductor
  name_template: '{{.Tag}}'
  extra_files:
    - glob: prompts.tar.gz
    - glob: context.tar.gz
    - glob: deploy/cf/standalone/standalone.yaml
    - glob: deploy/cf/standalone/userdata.sh
homebrew_casks:
  - name: ghostconductor
    repository:
      owner: GhostConductor
      name: homebrew-ghostconductor
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: Brew cask update for {{ .ProjectName }} version {{ .Tag }}
    directory: Casks
    description: AI agent orchestration platform
    homepage: https://ghostconductor.io
    binaries:
      - ghostconductor
    hooks:
      post:
        install: |
          system_command "/bin/mkdir", args: ["-p", "#{Dir.home}/ghostconductor/etc"]
          system_command "/bin/mkdir", args: ["-p", "#{Dir.home}/ghostconductor/jobs"]
          system_command "/bin/mkdir", args: ["-p", "#{Dir.home}/ghostconductor/repos"]
          system_command "/bin/mkdir", args: ["-p", "#{Dir.home}/ghostconductor/shared"]
          system_command "/usr/bin/curl", args: ["-sL", "-o", "/tmp/prompts.tar.gz", "https://github.com/GhostConductor/ghostconductor/releases/latest/download/prompts.tar.gz"]
          system_command "/usr/bin/curl", args: ["-sL", "-o", "/tmp/context.tar.gz", "https://github.com/GhostConductor/ghostconductor/releases/latest/download/context.tar.gz"]
          system_command "/usr/bin/tar", args: ["-xzf", "/tmp/prompts.tar.gz", "-C", "#{Dir.home}/ghostconductor/etc"]
          system_command "/usr/bin/tar", args: ["-xzf", "/tmp/context.tar.gz", "-C", "#{Dir.home}/ghostconductor/etc"]
          system_command "/usr/bin/touch", args: ["#{Dir.home}/ghostconductor/etc/CONTEXT.md"]
          system_command "/bin/rm", args: ["-f", "/tmp/prompts.tar.gz", "/tmp/context.tar.gz"]
        uninstall: |
          system_command "/bin/rm", args: ["-rf", "#{Dir.home}/ghostconductor"]
          system_command "/bin/rm", args: ["-rf", "#{Dir.home}/.ghostconductor"]
builds:
  - id: ghostconductor
    targets:
      - darwin_arm64_v8.0
      - linux_amd64_v1
      - darwin_amd64_v1
    dir: .
    main: ./cmd/ghostconductor
    binary: ghostconductor
    builder: go
    tool: go
    command: build
    ldflags:
      - -X main.defaultImage=ghcr.io/ghostconductor/ghost:latest
    env:
      - CGO_ENABLED=0
archives:
  - id: default
    builds_info:
      mode: 493
    name_template: ghostconductor-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    formats:
      - tar.gz
    files:
      - src: license*
      - src: LICENSE*
      - src: readme*
      - src: README*
      - src: changelog*
      - src: CHANGELOG*
nfpms:
  - file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
    package_name: ghostconductor
    contents:
      - src: prompts.tar.gz
        dst: /tmp/prompts.tar.gz
      - src: context.tar.gz
        dst: /tmp/context.tar.gz
    scripts:
      postinstall: deploy/scripts/postinstall.sh
    id: default
    formats:
      - deb
    vendor: GhostConductor
    homepage: https://ghostconductor.io
    maintainer: GhostConductor <hello@ghostconductor.io>
    description: AI agent orchestration platform
    license: MIT
    bindir: /usr/local/bin
    libdirs:
      header: /usr/include
      carchive: /usr/lib
      cshared: /usr/lib
srpm:
  nfpmrpm: {}
  package_name: ghostconductor
  file_name_template: '{{ .PackageName }}-{{ .Version }}.src.rpm'
  bins:
    ghostconductor: '%{goipath}'
snapshot:
  version_template: '{{ .Tag }}-dev'
checksum:
  name_template: checksums.txt
  algorithm: sha256
docker_digest:
  name_template: digests.txt
changelog:
  format: '{{ .SHA }} {{ .Message }}'
dist: dist
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
before:
  hooks:
    - npm install --prefix ui
    - npm run build --prefix ui
    - mkdir -p cmd/ghostconductor/ui/dist
    - cp -r ui/dist/ cmd/ghostconductor/ui/dist/
    - tar -czf prompts.tar.gz prompts/
    - tar -czf context.tar.gz context/
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    color: '#2D313E'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ print .ProjectName " " .Tag " is out! Check it out at " .ReleaseURL | mdv2escape }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  discourse:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: system
git:
  tag_sort: -version:refname
mcp:
  name: ""
  title: ""
  auth:
    type: none
retry:
  attempts: 10
  delay: 10s
  max_delay: 5m0s
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
